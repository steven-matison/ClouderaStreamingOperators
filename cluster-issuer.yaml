apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cfm-operator-ca-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cfm-operator-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: cfm-operator-ca
  secretName: cfm-operator-ca-tls
  issuerRef:
    name: cfm-operator-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cfm-operator-ca-issuer-signed
spec:
  ca:
    secretName: cfm-operator-ca-tls
