apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-server
  template:
    metadata:
      labels:
        app: embedding-server
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: tei-container
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
          # This is the magic part: it forces the token into the binary's face
          command: ["/bin/sh", "-c"]
          args: 
            - |
              text-embeddings-router \
              --model-id nomic-ai/nomic-embed-text-v1 \
              --port 80 \
              --hf-api-token "[hf-token]"
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: model-cache
              mountPath: /data
      volumes:
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-server-service
spec:
  selector:
    app: embedding-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
